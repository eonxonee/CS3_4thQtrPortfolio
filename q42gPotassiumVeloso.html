<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Movie List</title>
    <style>
        body { 
            font-family: Arial, Helvetica, sans-serif; 
            background-color: #ffdae5; 
            padding: 20px; 
            display: flex; 
            justify-content: center; 
            align-items: center;
        }
        .container { 
            width: 400px; 
            background: rgb(255, 165, 198); 
            padding: 20px; 
            border-radius: 8px; 
            box-shadow: 0 2px 10px rgba(118, 53, 53, 0.1); 
        }

        label { 
            display: block; 
            margin-top: 10px; 
            font-weight: bold; 
        }
        input, button { 
            width: 100%; 
            padding: 8px; 
            margin-top: 5px; 
            border: 1px solid #ffdae5; 
            border-radius: 4px; 
            box-sizing: border-box; }

        button { 
            background-color: #ff80c4; 
            color: white; 
            font-weight: bold; 
            cursor: pointer;
            border: none; 
            margin-top: 15px; 
        }

        button:hover { 
            background-color: #f76296; 
        }

        .stars i { 
            font-size: 24px;  
            color: #ffdae5; 
            margin-bottom: 10px;
            cursor: pointer; 
            transition: color 0.2s ease;
        }
        .stars i.selected { 
            color: rgb(0, 0, 0);
        }

        hr {
            height: 5px;
            border: none;
            background-color: #000000;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Add a Movie</h2>
        <form id="movieForm">
            <label for="title">Title:</label>
            <input type="text" id="title" required>

            <label for="year">Year:</label>
            <input type="number" id="year" required>

            <label for="genre">Genre:</label>
            <select id="genre" required>
                <option value="">Select...</option>
                <option value="Action">Action</option>
                <option value="Comedy">Comedy</option>
                <option value="Drama">Drama</option>
                <option value="Sci-Fi">Sci-Fi</option>
            </select>

            <label>Rating:</label>
            <div class="stars">
                <i class="fa-solid fa-star">★</i>
                <i class="fa-solid fa-star">★</i>
                <i class="fa-solid fa-star">★</i>
                <i class="fa-solid fa-star">★</i>
                <i class="fa-solid fa-star">★</i>
            </div>

            <button type="submit" id="addMovieBtn">Add Movie</button>
        </form>

        <hr>

        <h2>Movie List</h2>
        <div id="movieList">
        </div>
    </div>

    <script>
        const stars = document.querySelectorAll('.stars i');
        const titleInput = document.getElementById('title');
        const yearInput = document.getElementById('year');
        const genreInput = document.getElementById('genre');
        const movieListContainer = document.getElementById('movieList');
        
        let movieList = JSON.parse(localStorage.getItem('movieList')) || [];
        let currentRating = 0;

        // star rating
        stars.forEach((star) => {
            star.addEventListener("click", () => {
                currentRating = parseInt(star.getAttribute('data-value'));
                updateStarUI(currentRating);
            });
        });

        function updateStarUI(rating) {
            stars.forEach((s, idx) => {
                s.classList.toggle("selected", idx < rating);
            });
        }

        // render list
        function renderMovieList() {
            movieListContainer.innerHTML = '';
            movieList.forEach((movie, index) => {
                const div = document.createElement('div');
                div.className = 'movie-item';
                
                // average rating
                const displayStars = "★".repeat(Math.round(movie.rating)) + "☆".repeat(5 - Math.round(movie.rating));
                
                div.innerHTML = `
                    <div class="movie-info">
                        <strong>${movie.title}</strong> (${movie.year}) - ${movie.genre}, Rating: <span style="color: #ffc107">${displayStars}</span>
                    </div>
                    <button class="delete-btn" onclick="deleteMovie(${index})">Delete</button>
                `;
                movieListContainer.appendChild(div);
            });
        }

        // average or add
        document.getElementById('movieForm').addEventListener('submit', (event) => {
            event.preventDefault();

            const title = titleInput.value.trim();
            const year = yearInput.value;
            const genre = genreInput.value;

            if (currentRating === 0) {
                alert("Please select a rating!");
                return;
            }

            // find movie
            const existingIndex = movieList.findIndex(m => m.title.toLowerCase() === title.toLowerCase());

            if (existingIndex !== -1) {
                movieList[existingIndex].year = year;
                movieList[existingIndex].genre = genre;
                movieList[existingIndex].rating = (movieList[existingIndex].rating + currentRating) / 2;
            } else {
                // add new
                movieList.push({ title, year, genre, rating: currentRating });
            }

            saveAndRefresh();
            resetForm();
        });

        // delete movie
        window.deleteMovie = function(index) {
            if (confirm("Are you sure you want to delete this movie?")) {
                movieList.splice(index, 1);
                saveAndRefresh();
            }
        };

        function saveAndRefresh() {
            localStorage.setItem('movieList', JSON.stringify(movieList));
            renderMovieList();
        }

        function resetForm() {
            document.getElementById('movieForm').reset();
            currentRating = 0;
            updateStarUI(0);
        }

        renderMovieList();
    </script>
</body>
</html>
