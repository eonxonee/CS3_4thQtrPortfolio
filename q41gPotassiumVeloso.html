<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Movie List</title>
    <style>
        body { 
            font-family: Arial, Helvetica, sans-serif; 
            background-color: #ffdae5; 
            padding: 20px; 
            display: flex; 
            justify-content: center; 
            align-items: center;
        }
        .container { 
            width: 400px; 
            background: rgb(255, 165, 198); 
            padding: 20px; 
            border-radius: 8px; 
            box-shadow: 0 2px 10px rgba(118, 53, 53, 0.1); 
        }

        label { 
            display: block; 
            margin-top: 10px; 
            font-weight: bold; 
        }
        input, button { 
            width: 100%; 
            padding: 8px; 
            margin-top: 5px; 
            border: 1px solid #ffdae5; 
            border-radius: 4px; 
            box-sizing: border-box; }

        button { 
            background-color: #ff80c4; 
            color: white; 
            font-weight: bold; 
            cursor: pointer;
            border: none; 
            margin-top: 15px; 
        }

        button:hover { 
            background-color: #f76296; 
        }

        .stars i { 
            font-size: 24px;  
            color: #ffdae5; 
            margin-bottom: 10px;
            cursor: pointer; 
            transition: color 0.2s ease;
        }
        .stars i.selected { 
            color: rgb(0, 0, 0);
        }

        hr {
            height: 5px;
            border: none;
            background-color: #000000;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Add a Movie</h2>
        <form id="movieForm">
            <label for="title">Title:</label>
            <input type="text" id="title" required>

            <label for="year">Year:</label>
            <input type="number" id="year" required>

            <label for="genre">Genre:</label>
            <select id="genre" required>
                <option value="">Select...</option>
                <option value="Action">Action</option>
                <option value="Comedy">Comedy</option>
                <option value="Drama">Drama</option>
                <option value="Sci-Fi">Sci-Fi</option>
            </select>

            <label>Rating:</label>
            <div class="stars">
                <i class="fa-solid fa-star">★</i>
                <i class="fa-solid fa-star">★</i>
                <i class="fa-solid fa-star">★</i>
                <i class="fa-solid fa-star">★</i>
                <i class="fa-solid fa-star">★</i>
            </div>

            <button type="submit" id="addMovieBtn">Add Movie</button>
        </form>

        <hr>

        <h2>Movie List</h2>
        <div id="movieList">
        </div>
    </div>

    <script>
        const stars = document.querySelectorAll('.stars i');
        let movieList = JSON.parse(localStorage.getItem('movieList') || '[]');
        const title = document.getElementById('title');
        const year = document.getElementById('year');
        const genre = document.getElementById('genre');
        const movieListContainer = document.getElementById('movieList');

        function renderMovieList() {
            movieListContainer.innerHTML = '';
            movieList = Array.isArray(movieList) ? movieList : [];

            movieList.forEach((movie) => {
                const { title = '', year = '', genre = '', rating = 0 } = movie || {};
                const starsText = '★'.repeat(Number(rating) || 0) || 'No rating';
                const div = document.createElement('div');
                div.textContent = `${title} (${year}) - ${genre} - ${starsText}`;
                movieListContainer.appendChild(div);
            });
        }

        function getRating() {
            return Array.from(stars).filter(star => star.classList.contains('selected')).length;
        }

        stars.forEach((star, index1) => {
            star.addEventListener("click", () => {
                stars.forEach((s, index2) => {
                    if (index1 >= index2) {
                        s.classList.add("selected");
                    } else {
                        s.classList.remove("selected");
                    }
                });
            });
        });

        document.getElementById('addMovieBtn').addEventListener('click', (event) => {
            event.preventDefault();

            const movie = {
                title: title.value,
                year: year.value,
                genre: genre.value,
                rating: getRating()
            };

            movieList.push(movie);
            localStorage.setItem('movieList', JSON.stringify(movieList));
            renderMovieList();

            document.getElementById('movieForm').reset();
            stars.forEach(s => s.classList.remove('selected'));
        });

        renderMovieList();
    </script>
</body>
</html>
